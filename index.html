<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fff3d6">
<title>Sao Chăm Chỉ ⭐ — FocusOS Nhí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg1:#fff6e0; --bg2:#ffe3ec; --bg3:#dff6ff;
  --card:#ffffff; --ink:#3a2a5d; --ink2:#7b6ca6;
  --yellow:#ffc83d; --orange:#ff8a5c; --coral:#ff6b8a;
  --mint:#3ddc97; --sky:#4cc3ff; --purple:#8b5cf6; --pink:#ff7eb6;
  --shadow:0 8px 0 rgba(0,0,0,.08); --shadow2:0 12px 30px rgba(123,108,166,.25);
  --r:22px; --r2:30px;
}
body{
  font-family:'Fredoka','Baloo 2','Trebuchet MS',system-ui,sans-serif;
  color:var(--ink);
  background:linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3));
  background-attachment:fixed; min-height:100vh; padding:14px; overflow-x:hidden;
  font-size:18px; font-weight:500;
}
.wrap{max-width:520px;margin:0 auto;display:flex;flex-direction:column;gap:16px;padding-bottom:40px}
.top{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:var(--r2);
  padding:14px 16px;box-shadow:var(--shadow2);position:relative}
.mascot{font-size:46px;line-height:1;animation:bob 2.4s ease-in-out infinite;cursor:pointer}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-7px) rotate(4deg)}}
.hello{flex:1;min-width:0}
.hello .hi{font-size:14px;color:var(--ink2);font-weight:600}
.hello .nm{font-size:24px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer}
.hello .nm .pen{font-size:15px;opacity:.5}
.sound{width:48px;height:48px;border:none;border-radius:50%;background:var(--bg1);font-size:22px;
  cursor:pointer;box-shadow:var(--shadow);transition:transform .1s}
.sound:active{transform:scale(.9)}
.reward{background:linear-gradient(135deg,#fff,#fff8ec);border-radius:var(--r2);padding:18px;
  box-shadow:var(--shadow2);border:3px solid #ffe6a6;text-align:center}
.reward .ttl{font-size:16px;color:var(--ink2);font-weight:600;margin-bottom:4px}
.trophy{font-size:60px;line-height:1;transition:transform .3s;filter:grayscale(.7) opacity(.45)}
.trophy.win{filter:none;animation:pop .5s}
.starsrow{display:flex;justify-content:center;gap:8px;margin:10px 0 6px;flex-wrap:wrap}
.starsrow .st{font-size:34px;filter:grayscale(1) opacity(.35);transition:all .3s}
.starsrow .st.on{filter:none;animation:pop .4s}
.bar{height:16px;background:#ffe6a6;border-radius:99px;overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--yellow),var(--mint));transition:width .5s cubic-bezier(.5,1.6,.4,1)}
.goalrow{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;font-size:14px;color:var(--ink2)}
.goalrow button{width:34px;height:34px;border:none;border-radius:50%;background:var(--bg2);font-size:20px;
  font-weight:700;cursor:pointer;color:var(--coral);box-shadow:var(--shadow)}
.goalrow button:active{transform:scale(.9)}
.sec-h{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;margin:4px 4px -2px}
.sec-h .e{font-size:24px}
.tasks{display:flex;flex-direction:column;gap:12px}
.task{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:var(--r);
  padding:14px 16px;box-shadow:var(--shadow);border:3px solid transparent;cursor:pointer;
  transition:transform .12s, border-color .2s, opacity .3s}
.task:active{transform:scale(.98)}
.task .emo{font-size:34px;line-height:1;width:42px;text-align:center}
.task .tx{flex:1;font-size:19px;font-weight:600}
.task .chk{width:40px;height:40px;border-radius:50%;border:4px solid #e3ddf3;display:flex;
  align-items:center;justify-content:center;font-size:22px;color:#fff;transition:all .2s}
.task.done{border-color:var(--mint);background:#f2fff9}
.task.done .tx{text-decoration:line-through;color:var(--ink2)}
.task.done .chk{background:var(--mint);border-color:var(--mint);animation:pop .4s}
.task .del{font-size:20px;opacity:.3;padding:4px}
.task .del:active{opacity:.8}
.empty{text-align:center;color:var(--ink2);background:var(--card);border-radius:var(--r);
  padding:24px;box-shadow:var(--shadow);font-weight:600}
.empty .big{font-size:40px;display:block;margin-bottom:6px}
.bigbtn{border:none;border-radius:var(--r2);padding:18px;font-size:22px;font-weight:700;color:#fff;
  font-family:inherit;cursor:pointer;box-shadow:0 7px 0 rgba(0,0,0,.13);transition:transform .1s, box-shadow .1s;
  display:flex;align-items:center;justify-content:center;gap:10px}
.bigbtn:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.13)}
.bigbtn.add{background:linear-gradient(135deg,var(--coral),var(--orange))}
.bigbtn.go{background:linear-gradient(135deg,var(--purple),var(--sky))}
.bigbtn.full{width:100%}
.timer{background:var(--card);border-radius:var(--r2);padding:20px;box-shadow:var(--shadow2);text-align:center}
.ring-wrap{position:relative;width:200px;height:200px;margin:6px auto 10px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-wrap .face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap .face .ch{font-size:46px;line-height:1}
.ring-wrap .face .tm{font-size:34px;font-weight:700;margin-top:2px}
.durs{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.dur{border:none;border-radius:16px;padding:10px 16px;font-size:16px;font-weight:700;font-family:inherit;
  background:var(--bg1);color:var(--ink2);cursor:pointer;box-shadow:var(--shadow)}
.dur.on{background:var(--purple);color:#fff}
.dur:active{transform:scale(.94)}
.tbtns{display:flex;gap:10px}
.week{background:var(--card);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow2)}
.days{display:flex;justify-content:space-between;gap:4px;margin-top:10px}
.day{flex:1;text-align:center}
.day .dot{width:42px;height:42px;margin:0 auto 4px;border-radius:50%;background:var(--bg1);
  display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:inset 0 0 0 3px #f0ebfa}
.day.win .dot{background:linear-gradient(135deg,var(--yellow),var(--orange));box-shadow:none;animation:pop .4s}
.day.today .lbl{color:var(--coral);font-weight:700}
.day .lbl{font-size:13px;color:var(--ink2);font-weight:600}
.foot{text-align:center;color:var(--ink2);font-weight:600;font-size:15px;padding:6px}
.overlay{position:fixed;inset:0;background:rgba(58,42,93,.45);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center;z-index:50}
.overlay.show{display:flex;animation:fade .2s}
.sheet{background:var(--card);width:100%;max-width:520px;border-radius:var(--r2) var(--r2) 0 0;
  padding:22px 20px 30px;box-shadow:0 -10px 40px rgba(0,0,0,.2);animation:up .25s cubic-bezier(.4,1.4,.5,1)}
.sheet h3{font-size:22px;margin-bottom:14px;text-align:center}
.preset{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chip{border:none;border-radius:16px;padding:10px 12px;font-size:15px;font-weight:600;font-family:inherit;
  background:var(--bg1);cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow)}
.chip:active{transform:scale(.94)}
.sep{text-align:center;color:var(--ink2);font-size:14px;margin:6px 0 10px}
.emojis{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px}
.emo-pick{width:46px;height:46px;border:3px solid transparent;border-radius:14px;background:var(--bg1);
  font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emo-pick.on{border-color:var(--purple);background:#efe9ff;transform:scale(1.05)}
.tinput{width:100%;border:3px solid #e3ddf3;border-radius:16px;padding:14px 16px;font-size:18px;
  font-family:inherit;font-weight:600;color:var(--ink);margin-bottom:14px;outline:none}
.tinput:focus{border-color:var(--purple)}
.modal-btns{display:flex;gap:10px}
.modal-btns .ghost{background:var(--bg1);color:var(--ink2);box-shadow:var(--shadow)}
.celebrate{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:60;pointer-events:none}
.celebrate.show{display:flex}
.celebrate .msg{background:#fff;border-radius:var(--r2);padding:26px 34px;box-shadow:var(--shadow2);
  text-align:center;animation:pop .5s;border:4px solid var(--yellow)}
.celebrate .msg .b{font-size:64px}
.celebrate .msg .t{font-size:24px;font-weight:700;margin-top:6px}
.confetti{position:fixed;top:-20px;width:12px;height:18px;z-index:55;border-radius:3px;pointer-events:none}
@keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fall{to{transform:translateY(105vh) rotate(640deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="mascot" id="mascot" title="Chạm vào mình nè!">⭐</div>
    <div class="hello">
      <div class="hi">Chào buổi sáng nắng đẹp!</div>
      <div class="nm" id="nameBtn"><span id="kidName">bé</span> 👋 <span class="pen">✏️</span></div>
    </div>
    <button class="sound" id="soundBtn" title="Bật/tắt âm thanh">🔊</button>
  </div>

  <div class="reward">
    <div class="ttl">Hôm nay bé đã làm xong</div>
    <div class="trophy" id="trophy">🏆</div>
    <div class="starsrow" id="starsRow"></div>
    <div class="bar"><i id="barFill"></i></div>
    <div class="goalrow">
      <span>Mục tiêu:</span>
      <button id="goalMinus">–</button>
      <b><span id="goalNum">3</span> ⭐</b>
      <button id="goalPlus">+</button>
    </div>
  </div>

  <div class="sec-h"><span class="e">📋</span> Việc của bé hôm nay</div>
  <div class="tasks" id="taskList"></div>
  <button class="bigbtn add full" id="openAdd">➕ Thêm việc mới</button>

  <div class="sec-h"><span class="e">🚀</span> Giờ tập trung</div>
  <div class="timer">
    <div class="durs" id="durs">
      <button class="dur on" data-min="5">5 phút</button>
      <button class="dur" data-min="10">10 phút</button>
      <button class="dur" data-min="15">15 phút</button>
    </div>
    <div class="ring-wrap">
      <svg width="200" height="200">
        <circle cx="100" cy="100" r="88" fill="none" stroke="#f0ebfa" stroke-width="16"/>
        <circle id="ring" cx="100" cy="100" r="88" fill="none" stroke="url(#g)" stroke-width="16"
                stroke-linecap="round" stroke-dasharray="552.9" stroke-dashoffset="0"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#4cc3ff"/>
        </linearGradient></defs>
      </svg>
      <div class="face"><div class="ch" id="timerCh">🚀</div><div class="tm" id="timerTxt">05:00</div></div>
    </div>
    <div class="tbtns">
      <button class="bigbtn go full" id="timerBtn">▶️ Bắt đầu</button>
    </div>
  </div>

  <div class="week">
    <div class="sec-h" style="margin:0"><span class="e">🗓️</span> Tuần chăm chỉ</div>
    <div class="days" id="days"></div>
  </div>

  <div class="foot">Bé làm được mà! Cố lên nhé 💪💖</div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h3>Bé muốn thêm việc gì? 🌈</h3>
    <div class="preset" id="preset"></div>
    <div class="sep">— hoặc tự tạo việc mới —</div>
    <div class="emojis" id="emojis"></div>
    <input class="tinput" id="taskInput" placeholder="Ví dụ: Tưới cây 🌱" maxlength="40">
    <div class="modal-btns">
      <button class="bigbtn ghost full" id="cancelAdd">Đóng lại</button>
      <button class="bigbtn add full" id="confirmAdd">Thêm 🎉</button>
    </div>
  </div>
</div>

<div class="celebrate" id="celebrate"><div class="msg"><div class="b" id="celeB">🎉</div><div class="t" id="celeT">Giỏi quá!</div></div></div>

<script>
/* ===== STORAGE: localStorage + fallback an toàn ===== */
var KEY='kidfocus_v1', mem=null;
function load(){ try{var r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){return mem;} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){mem=state;} }
function today(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

var DEFAULT={ name:'bé', sound:true, goal:3, tasks:[
  {id:1,emoji:'🦷',text:'Đánh răng',done:false},
  {id:2,emoji:'📚',text:'Học bài',done:false},
  {id:3,emoji:'🧸',text:'Dọn đồ chơi',done:false}
], lastDate:today(), stickers:{} };

var state=load()||JSON.parse(JSON.stringify(DEFAULT));

/* Ngày mới -> reset việc; ghi sticker nếu hôm qua đạt mục tiêu */
if(state.lastDate!==today()){
  var doneY=(state.tasks||[]).filter(function(t){return t.done;}).length;
  if(doneY>=state.goal){ state.stickers=state.stickers||{}; state.stickers[state.lastDate]=true; }
  (state.tasks||[]).forEach(function(t){t.done=false;});
  state.lastDate=today(); save();
}

/* ===== SOUND ===== */
var actx;
function beep(freqs){ if(!state.sound)return; try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  freqs.forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=f;
    o.connect(g);g.connect(actx.destination);var t=actx.currentTime+i*0.11;
    g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.25,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);o.start(t);o.stop(t+0.24);});}catch(e){} }
function sFx(){beep([523,659,784,1047]);}
function tap(){beep([660]);}

/* ===== CONFETTI + CELEBRATE ===== */
function confetti(n){ var cols=['#ffc83d','#ff6b8a','#3ddc97','#4cc3ff','#8b5cf6','#ff7eb6'];
  for(var i=0;i<(n||40);i++){ (function(idx){ var c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';c.style.background=cols[idx%cols.length];
    var dur=1.6+Math.random()*1.4;c.style.animation='fall '+dur+'s linear forwards';
    c.style.transform='rotate('+Math.random()*360+'deg)';document.body.appendChild(c);
    setTimeout(function(){c.remove();},dur*1000); })(i); } }
var CHEERS=['Giỏi quá! 🌟','Tuyệt vời! 🎉','Bé siêu lắm! 💪','Hoan hô! 👏','Xuất sắc! ✨'];
function celebrate(big,txt){ var el=document.getElementById('celebrate');
  document.getElementById('celeB').textContent=big||'🎉';
  document.getElementById('celeT').textContent=txt||CHEERS[Math.floor(Math.random()*CHEERS.length)];
  el.classList.add('show');confetti(50);sFx();
  clearTimeout(celebrate._t);celebrate._t=setTimeout(function(){el.classList.remove('show');},1500); }

/* ===== RENDER ===== */
function doneCount(){return state.tasks.filter(function(t){return t.done;}).length;}
function render(){
  document.getElementById('kidName').textContent=state.name;
  document.getElementById('goalNum').textContent=state.goal;
  document.getElementById('soundBtn').textContent=state.sound?'🔊':'🔇';
  var list=document.getElementById('taskList');list.innerHTML='';
  if(state.tasks.length===0){
    list.innerHTML='<div class="empty"><span class="big">🌱</span>Chưa có việc nào.<br>Bấm nút thêm việc nhé!</div>';
  } else {
    state.tasks.forEach(function(t){
      var d=document.createElement('div');d.className='task'+(t.done?' done':'');
      d.innerHTML='<div class="emo">'+t.emoji+'</div><div class="tx"></div>'+
                  '<div class="chk">'+(t.done?'✓':'')+'</div><div class="del">🗑️</div>';
      d.querySelector('.tx').textContent=t.text;
      d.querySelector('.del').onclick=function(e){e.stopPropagation();
        state.tasks=state.tasks.filter(function(x){return x.id!==t.id;});save();render();};
      d.onclick=function(){toggle(t.id);};
      list.appendChild(d);
    });
  }
  var dc=doneCount(), goal=state.goal;
  var sr=document.getElementById('starsRow');sr.innerHTML='';
  for(var i=0;i<goal;i++){var s=document.createElement('div');s.className='st'+(i<dc?' on':'');s.textContent='⭐';sr.appendChild(s);}
  document.getElementById('barFill').style.width=Math.min(100,goal?dc/goal*100:0)+'%';
  var tr=document.getElementById('trophy');
  if(dc>=goal&&goal>0){tr.classList.add('win');}else{tr.classList.remove('win');}
  renderWeek();
  save();
}
var DOW=['CN','T2','T3','T4','T5','T6','T7'];
function renderWeek(){
  var box=document.getElementById('days');box.innerHTML='';
  var now=new Date(); var dow=now.getDay();
  var monOffset=(dow===0?-6:1-dow);
  for(var i=0;i<7;i++){
    var d=new Date(now);d.setDate(now.getDate()+monOffset+i);
    var key=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    var isToday=key===today();
    var won=(state.stickers&&state.stickers[key])||(isToday&&doneCount()>=state.goal&&state.goal>0);
    var el=document.createElement('div');el.className='day'+(won?' win':'')+(isToday?' today':'');
    el.innerHTML='<div class="dot">'+(won?'🌟':'·')+'</div><div class="lbl">'+DOW[d.getDay()]+'</div>';
    box.appendChild(el);
  }
}
function toggle(id){
  var t=state.tasks.find(function(x){return x.id===id;});if(!t)return;
  t.done=!t.done; save();
  if(t.done){tap();confetti(18);}
  render();
  if(t.done && doneCount()===state.goal && state.goal>0){
    state.stickers=state.stickers||{}; state.stickers[today()]=true; save();
    setTimeout(function(){celebrate('🏆','Hoàn thành mục tiêu hôm nay!');},250);
    renderWeek();
  }
}

/* ===== ADD TASK ===== */
var PRESETS=[['🦷','Đánh răng'],['📖','Đọc sách'],['🏃','Tập thể dục'],['🛏️','Dọn giường'],
  ['🥗','Ăn rau'],['💧','Uống nước'],['🎨','Vẽ tranh'],['🎹','Tập đàn'],['🧸','Dọn đồ chơi'],
  ['🐶','Cho thú cưng ăn'],['🙏','Cảm ơn ba mẹ'],['😴','Ngủ đúng giờ']];
var EMOJIS=['😀','🦷','📚','📖','🏃','🎨','🎹','⚽','🧸','🌱','🐶','🐱','🥗','💧','🛏️','🧹','🎵','⭐','❤️','🚀'];
var pickedEmoji='😀';
function buildModal(){
  var p=document.getElementById('preset');p.innerHTML='';
  PRESETS.forEach(function(it){var b=document.createElement('button');b.className='chip';
    b.innerHTML='<span style="font-size:20px">'+it[0]+'</span> '+it[1];
    b.onclick=function(){addTask(it[0],it[1]);closeAdd();celebrate('✅','Đã thêm việc!');};p.appendChild(b);});
  var e=document.getElementById('emojis');e.innerHTML='';
  EMOJIS.forEach(function(em){var b=document.createElement('button');b.className='emo-pick'+(em===pickedEmoji?' on':'');
    b.textContent=em;b.onclick=function(){pickedEmoji=em;buildModal();};e.appendChild(b);});
}
function addTask(emoji,text){ state.tasks.push({id:Date.now()+Math.floor(Math.random()*999),emoji:emoji,text:text,done:false});save();render(); }
function openAdd(){pickedEmoji='😀';document.getElementById('taskInput').value='';document.getElementById('taskInput').style.borderColor='';buildModal();document.getElementById('overlay').classList.add('show');}
function closeAdd(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('openAdd').onclick=function(){tap();openAdd();};
document.getElementById('cancelAdd').onclick=closeAdd;
document.getElementById('overlay').onclick=function(e){if(e.target===this)closeAdd();};
document.getElementById('confirmAdd').onclick=function(){
  var v=document.getElementById('taskInput').value.trim();
  if(!v){document.getElementById('taskInput').style.borderColor='var(--coral)';return;}
  addTask(pickedEmoji,v);closeAdd();celebrate('✅','Đã thêm việc!');
};
document.getElementById('taskInput').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('confirmAdd').click();});

/* ===== GOAL / NAME / SOUND / MASCOT ===== */
document.getElementById('goalPlus').onclick=function(){if(state.goal<8){state.goal++;tap();render();}};
document.getElementById('goalMinus').onclick=function(){if(state.goal>1){state.goal--;tap();render();}};
document.getElementById('nameBtn').onclick=function(){
  var n=prompt('Tên của bé là gì?',state.name);if(n&&n.trim()){state.name=n.trim().slice(0,16);save();render();}
};
document.getElementById('soundBtn').onclick=function(){state.sound=!state.sound;save();render();if(state.sound)tap();};
document.getElementById('mascot').onclick=function(){var c=['Bé giỏi lắm! 🌟','Cố lên nha! 💪','Mình tin bé làm được! ✨','Yêu bé nhiều! 💖'];
  celebrate('⭐',c[Math.floor(Math.random()*c.length)]);};

/* ===== FOCUS TIMER ===== */
var C=552.9, dur=5*60, left=dur, running=false, ti=null;
function fmt(s){var m=Math.floor(s/60),x=s%60;return (m<10?'0':'')+m+':'+(x<10?'0':'')+x;}
function drawTimer(){
  document.getElementById('timerTxt').textContent=fmt(left);
  var prog=dur?left/dur:0;document.getElementById('ring').style.strokeDashoffset=C*(1-prog);
  var ch=document.getElementById('timerCh');
  ch.textContent=!running?'🚀':(prog>.66?'🚀':prog>.33?'🌟':'🎯');
}
function tick(){ if(left<=0){stopTimer(true);return;} left--;drawTimer(); }
function startTimer(){ if(running)return;running=true;document.getElementById('timerBtn').textContent='⏸️ Tạm nghỉ';ti=setInterval(tick,1000); }
function pauseTimer(){running=false;clearInterval(ti);document.getElementById('timerBtn').textContent='▶️ Tiếp tục';drawTimer();}
function stopTimer(finished){running=false;clearInterval(ti);
  if(finished){left=0;drawTimer();celebrate('🎉','Bé tập trung rất giỏi!');
    document.getElementById('timerBtn').textContent='▶️ Bắt đầu';left=dur;setTimeout(drawTimer,1600);} }
document.getElementById('timerBtn').onclick=function(){tap();if(running)pauseTimer();else startTimer();};
document.querySelectorAll('.dur').forEach(function(b){
  b.onclick=function(){document.querySelectorAll('.dur').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');dur=parseInt(b.dataset.min)*60;left=dur;pauseTimer();
    document.getElementById('timerBtn').textContent='▶️ Bắt đầu';drawTimer();};
});

/* ===== GO ===== */
render(); drawTimer();
</script>
</body>
</html>
